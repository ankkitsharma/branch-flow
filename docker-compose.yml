services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - client

  client:
    build:
      context: ./client
      dockerfile: ./client/Dockerfile
    container_name: client
    environment:
      - NODE_ENV=production
