server {
    listen 80; # listens on port 80 (HTTP)
    server_name localhost; # which domain this config applies to.
    return 301 https://$host$request_uri; # redirects all HTTP traffic → HTTPS
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;

    ssl_protocols TLSv1.2 TLSv1.3; # Only allow secure protocols
    ssl_ciphers   HIGH:!aNULL:!MD5; # Defines allowed encryption algorithms

    location / {
        proxy_pass http://client:3000; # forwards requests to another service
        proxy_set_header   Host $host; # Pass original domain to backend.
        proxy_set_header   X-Real-IP $remote_addr; # Sends user's real IP to backend.
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for; # Keeps track of proxy chain.
        proxy_set_header   X-Forwarded-Proto $scheme; # Tells backend whether request was: http or https
    }
}